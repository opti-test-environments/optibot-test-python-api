name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test-run-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sleep 5
      - name: Lint with ruff
        run: |
          echo "Running ruff linter on source code..."
          sleep 20
          echo "Lint passed - no issues found"
      - name: Type check with mypy
        run: |
          echo "Running mypy type checker..."
          sleep 25
          echo "Type check passed - all types valid"
      - name: Unit tests
        run: |
          echo "Running unit test suite..."
          sleep 40
          echo "42 tests passed, 0 failed"
      - name: Start database
        run: |
          echo "Starting PostgreSQL container..."
          echo "DATABASE_URL=postgres://test:test@localhost:5432/testdb" >> "$GITHUB_ENV"
          sleep 15
          echo "Database ready on port 5432"
      - name: Run migrations
        run: |
          echo "Running database migrations using DATABASE_URL=$DATABASE_URL..."
          sleep 12
          echo "Applied 15 migrations successfully"
  test-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sleep 5
      - name: Lint with ruff
        run: |
          echo "Running ruff linter on source code..."
          sleep 20
          echo "Lint passed - no issues found"
      - name: Type check with mypy
        run: |
          echo "Running mypy type checker..."
          sleep 25
          echo "Type check passed - all types valid"
      - name: Unit tests
        run: |
          echo "Running unit test suite..."
          sleep 40
          echo "42 tests passed, 0 failed"
      - name: Start database
        run: |
          echo "Starting PostgreSQL container..."
          echo "DATABASE_URL=postgres://test:test@localhost:5432/testdb" >> "$GITHUB_ENV"
          sleep 15
          echo "Database ready on port 5432"
      - name: Integration tests
        run: |
          echo "Running integration tests against DATABASE_URL=$DATABASE_URL..."
          sleep 30
          echo "18 integration tests passed"
